# fly.toml app configuration file generated for census-mcp-bold-dream-9913 on 2026-04-23T23:56:28-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'census-mcp-bold-dream-9913'
primary_region = 'iad'

[build]
  dockerfile = 'mcp-server/Dockerfile.http'

[env]
  PORT = '8080'
  SQLITE_PATH = '/app/census-metadata.sqlite'
  TRUST_PROXY = '2'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '10s'
    method = 'get'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
